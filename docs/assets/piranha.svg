<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 165" role="img" aria-label="Piranha">
  <defs>
    <linearGradient id="pBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FF7A4C"/>
      <stop offset="26%"  stop-color="#F04A22"/>
      <stop offset="62%"  stop-color="#C22812"/>
      <stop offset="100%" stop-color="#6E0F05"/>
    </linearGradient>

    <linearGradient id="pJawLo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#B32410"/>
      <stop offset="100%" stop-color="#F0562C"/>
    </linearGradient>

    <linearGradient id="pFin" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%"   stop-color="#D42D14"/>
      <stop offset="100%" stop-color="#5C0C04"/>
    </linearGradient>

    <linearGradient id="pTooth" x1="0.15" y1="0" x2="0.75" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="42%"  stop-color="#EEF3F7"/>
      <stop offset="100%" stop-color="#AEBCC8"/>
    </linearGradient>

    <!-- The mouth is gum, not a void. Every stop stays bright: a dark fill behind white
         teeth reads as a hole punched through the head, however the shape is drawn. -->
    <linearGradient id="pMouth" x1="0.1" y1="0" x2="0.6" y2="1">
      <stop offset="0%"   stop-color="#D4381E"/>
      <stop offset="55%"  stop-color="#A81C0C"/>
      <stop offset="100%" stop-color="#7A1207"/>
    </linearGradient>

    <radialGradient id="pIris" cx="0.36" cy="0.32" r="0.8">
      <stop offset="0%"   stop-color="#EAFDFF"/>
      <stop offset="22%"  stop-color="#67E6FA"/>
      <stop offset="52%"  stop-color="#22D3EE"/>
      <stop offset="80%"  stop-color="#0A7D94"/>
      <stop offset="100%" stop-color="#04222A"/>
    </radialGradient>

    <linearGradient id="pGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity=".36"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="pGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── fins behind the body ─────────────────────────────── -->
  <path fill="url(#pFin)" d="M112,27 L96,2 L80,32 Z"/>
  <path fill="url(#pFin)" d="M72,35 L62,15 L58,41 Z"/>
  <path fill="#5C0C04" d="M48,46 L42,33 L38,51 Z"/>
  <path fill="url(#pFin)" d="M74,128 L82,154 L96,133 Z"/>
  <path fill="url(#pFin)" d="M112,136 L116,151 L128,132 Z"/>

  <!-- tail -->
  <path fill="url(#pFin)" d="M32,60 L4,32 L18,82 L4,132 L32,104 Z"/>
  <path fill="#4A0903" opacity=".5" d="M18,82 L4,32 L14,80 Z"/>

  <!-- ── the mouth: a curved wedge of gum, shaped like a real interior. Sized to the
         open-jaw sweep; the closed jaw hides its lower lip. ── -->
  <path fill="url(#pMouth)" d="M206,70 L166,86 C170,94 184,98 204,100 Z"/>

  <!-- ── body: head, snout and upper jaw are ONE piece ────── -->
  <path fill="url(#pBody)" d="
    M206,70
    C190,55 174,45 158,38
    C136,27 106,25 84,32
    C62,39 44,49 32,60
    L32,104
    C46,118 64,128 86,133
    C112,139 142,131 162,116
    L164,98
    L166,86
    Z"/>

  <!-- Jaw socket. Without it there is a wedge of nothing between the body's chin and the
       jaw's rear corner — the background shows through, and the gap widens as the jaw
       opens. The jaw must always have body to hinge against. -->
  <path fill="#A81C0C" d="M148,84 C166,88 176,100 174,120 C162,126 150,114 146,98 Z"/>

  <!-- armour plate seams -->
  <g fill="none" stroke="#5E0D04" stroke-opacity=".45" stroke-width="1.5" stroke-linecap="round">
    <path d="M142,36 C132,62 132,100 144,124"/>
    <path d="M114,28 C102,58 102,102 116,132"/>
    <path d="M86,30 C74,58 74,100 88,131"/>
    <path d="M58,41 C48,63 48,97 60,121"/>
  </g>
  <path fill="#3F0802" opacity=".3" d="M32,60 L32,104 C40,112 48,118 58,122 L54,44 Z"/>

  <!-- dorsal gloss -->
  <path fill="url(#pGloss)" d="M186,54 C166,40 132,30 100,30 C76,30 54,42 38,58
    C58,42 80,36 102,37 C136,38 168,44 186,54 Z"/>

  <!-- ── gill slits: grooves carved into the flank, current burning INSIDE ── -->
  <g fill="none" stroke-linecap="round">
    <!-- raised bevel around each slit -->
    <g stroke="#7A1207" stroke-opacity=".5" stroke-width="9.5">
      <path d="M130,52 C122,68 122,90 132,104"/>
      <path d="M119,54 C111,69 111,89 121,102"/>
      <path d="M109,57 C102,71 102,87 111,99"/>
    </g>
    <!-- the groove — deep and dark -->
    <g stroke="#2E0601" stroke-width="6.4">
      <path d="M130,52 C122,68 122,90 132,104"/>
      <path d="M119,54 C111,69 111,89 121,102"/>
      <path d="M109,57 C102,71 102,87 111,99"/>
    </g>
    <!-- the current: the SAME path as the groove, trimmed at both ends with a dash
         offset, so it can never drift out of the slit's shape -->
    <g filter="url(#pGlow)" stroke="#22D3EE" stroke-width="2.5" opacity=".95"
       pathLength="100" stroke-dasharray="72 100" stroke-dashoffset="-14">
      <path d="M130,52 C122,68 122,90 132,104"/>
      <path d="M119,54 C111,69 111,89 121,102"/>
      <path d="M109,57 C102,71 102,87 111,99"/>
    </g>
  </g>

  <!-- pectoral fin, in front of the body -->
  <path fill="#8E1508" d="M156,104 L146,125 L170,110 Z"/>

  <!-- ── eye ──────────────────────────────────────────────── -->
  <circle cx="148" cy="64" r="14.5" fill="#1C0603"/>
  <circle cx="148" cy="64" r="12.6" fill="#3B0A04"/>
  <circle cx="148" cy="64" r="11" fill="url(#pIris)"/>
  <circle cx="150" cy="65.5" r="4.6" fill="#031117"/>
  <circle cx="143.5" cy="58.5" r="3.1" fill="#FFFFFF" opacity=".92"/>
  <circle cx="153.5" cy="70" r="1.5" fill="#FFFFFF" opacity=".45"/>
  <path fill="#FFFFFF" opacity=".13" d="M138,71 C140,77 148,79 154,76 C147,78 141,76 138,71 Z"/>
  <!-- brow overhangs the eye: the angry read -->
  <path fill="#8E1508" d="M134,51 C144,47 160,49 170,60 L165,66 C156,56 144,53 135,57 Z"/>

  <!-- ── lower jaw. Its gum meets the upper lip when shut, so no mouth shows. Drawn
         BEFORE the upper fangs — otherwise the jaw plate buries them. ── -->
  <path fill="url(#pJawLo)" d="M205,76 L166,91 L162,108 C180,118 201,112 210,88 Z"/>
  <path fill="#FF8C5E" opacity=".26" d="M204,92 L166,101 L165,105 C180,109 197,104 207,92 Z"/>
  <path fill="#8E1508" d="M205,76 L166,91 L166,88 L205,73 Z"/>
  <g fill="url(#pTooth)">
    <path d="M205.0,76.0 L198.5,78.5 L202.8,63.3 Z"/>
    <path d="M198.5,78.5 L192.0,81.0 L196.3,67.8 Z"/>
    <path d="M192.0,81.0 L185.4,83.5 L189.7,67.3 Z"/>
    <path d="M185.4,83.5 L178.9,86.1 L183.2,73.8 Z"/>
    <path d="M178.9,86.1 L172.3,88.6 L176.6,74.4 Z"/>
    <path d="M172.3,88.6 L166.0,91.0 L170.2,78.8 Z"/>
  </g>

  <!-- ── upper gum + fangs. Last, so they hang over the jaw — the underbite read. ── -->
  <path fill="#8E1508" d="M206,70 L166,86 L167,89 L207,73 Z"/>
  <g fill="url(#pTooth)">
    <path d="M205.8,70.1 L198.8,72.9 L203.8,86.5 Z"/>
    <path d="M198.8,72.9 L191.8,75.7 L196.8,86.8 Z"/>
    <path d="M191.8,75.7 L184.8,78.5 L189.8,93.1 Z"/>
    <path d="M184.8,78.5 L177.9,81.2 L182.9,92.9 Z"/>
    <path d="M177.9,81.2 L170.9,84.0 L175.9,97.6 Z"/>
    <path d="M170.9,84.0 L166.0,86.0 L170.0,97.0 Z"/>
  </g>
</svg>
